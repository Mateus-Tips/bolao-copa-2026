<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palpites Copa 2026</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --surface2: #f1f0ec;
    --border: rgba(0,0,0,0.1);
    --border-md: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text-muted: #6b6b66;
    --text-hint: #9b9b95;
    --green-bg: #eaf3de; --green-text: #27500a;
    --amber-bg: #faeeda; --amber-text: #633806;
    --red-bg: #fcebeb; --red-text: #791f1f;
    --blue-bg: #e6f1fb; --blue-text: #185fa5;
    --radius: 8px; --radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18; --surface: #242422; --surface2: #2e2e2b;
      --border: rgba(255,255,255,0.1); --border-md: rgba(255,255,255,0.18);
      --text: #f0efe8; --text-muted: #9b9b95; --text-hint: #6b6b66;
      --green-bg: #173404; --green-text: #c0dd97;
      --amber-bg: #412402; --amber-text: #fac775;
      --red-bg: #501313; --red-text: #f7c1c1;
      --blue-bg: #042c53; --blue-text: #b5d4f4;
    }
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
    padding: 0 0 3rem;
  }

  .top-bar {
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    padding: 1rem 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: .75rem;
  }

  .top-bar h1 {
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .top-bar h1 span { font-size: 20px; }

  .metrics {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .metric {
    background: var(--surface2);
    border-radius: var(--radius);
    padding: .45rem .9rem;
    text-align: center;
    min-width: 72px;
  }

  .metric-val {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
  }

  .metric-label {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 1px;
    text-transform: uppercase;
    letter-spacing: .03em;
  }

  .content { max-width: 860px; margin: 0 auto; padding: 1.25rem 1rem 0; }

  .filters {
    display: flex;
    gap: 6px;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 5px 14px;
    border: 0.5px solid var(--border-md);
    border-radius: 999px;
    background: transparent;
    font-size: 13px;
    cursor: pointer;
    color: var(--text-muted);
    transition: all .15s;
    font-family: inherit;
  }

  .filter-btn:hover { background: var(--surface2); }
  .filter-btn.active {
    background: var(--blue-bg);
    border-color: transparent;
    color: var(--blue-text);
    font-weight: 500;
  }

  .reset-btn {
    margin-left: auto;
    padding: 5px 14px;
    border: 0.5px solid var(--border-md);
    border-radius: 999px;
    background: transparent;
    font-size: 12px;
    cursor: pointer;
    color: var(--text-hint);
    font-family: inherit;
    transition: all .15s;
  }
  .reset-btn:hover { color: var(--red-text); border-color: var(--red-text); }

  .saved-toast {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: var(--green-bg);
    color: var(--green-text);
    border: 0.5px solid var(--green-text);
    padding: .5rem 1rem;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    transform: translateY(8px);
    transition: all .25s;
    pointer-events: none;
    z-index: 200;
  }
  .saved-toast.show { opacity: 1; transform: translateY(0); }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    background: var(--surface);
    border-radius: var(--radius-lg);
    overflow: hidden;
    border: 0.5px solid var(--border);
  }

  thead th {
    padding: 9px 12px;
    text-align: left;
    color: var(--text-muted);
    font-weight: 400;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .05em;
    border-bottom: 0.5px solid var(--border);
    background: var(--surface2);
  }

  thead th.center { text-align: center; }

  tbody tr { border-bottom: 0.5px solid var(--border); transition: background .1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }

  td { padding: 10px 12px; vertical-align: middle; color: var(--text); }
  td.center { text-align: center; }

  .match-name { font-weight: 500; font-size: 13.5px; line-height: 1.3; }
  .match-meta { display: flex; gap: 6px; margin-top: 3px; align-items: center; }
  .match-date { font-size: 11px; color: var(--text-hint); }

  .grp-badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 10px;
    background: var(--surface2);
    color: var(--text-muted);
    border: 0.5px solid var(--border);
  }

  .palpite { font-size: 15px; font-weight: 600; color: var(--text); }

  .result-input { display: flex; align-items: center; justify-content: center; gap: 4px; }

  .score-in {
    width: 38px;
    padding: 5px 4px;
    border: 0.5px solid var(--border-md);
    border-radius: 6px;
    font-size: 15px;
    font-weight: 600;
    text-align: center;
    background: var(--bg);
    color: var(--text);
    font-family: inherit;
    transition: border-color .15s;
    -moz-appearance: textfield;
  }

  .score-in::-webkit-outer-spin-button,
  .score-in::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .score-in:focus { outline: none; border-color: var(--blue-text); }

  .score-sep { color: var(--text-hint); font-size: 14px; padding: 0 1px; }

  .official-result { font-size: 15px; font-weight: 600; color: var(--text); }
  .official-label { font-size: 10px; color: var(--text-hint); margin-top: 2px; }

  .pts-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    font-size: 13px;
    font-weight: 600;
  }

  .pts-3 { background: var(--green-bg); color: var(--green-text); }
  .pts-1 { background: var(--amber-bg); color: var(--amber-text); }
  .pts-0 { background: var(--red-bg); color: var(--red-text); }
  .pts-pending { background: var(--surface2); color: var(--text-hint); }

  .no-results {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-muted);
    font-size: 14px;
    background: var(--surface);
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--border);
  }

  .section-header {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .06em;
    padding: 1.1rem 0 .4rem;
  }

  @media (max-width: 600px) {
    .top-bar { padding: .75rem 1rem; }
    .metric { min-width: 58px; padding: .4rem .7rem; }
    .metric-val { font-size: 17px; }
    .content { padding: 1rem .75rem 0; }
    .match-name { font-size: 12.5px; }
    td { padding: 8px 8px; }
  }
</style>
</head>
<body>

<div class="top-bar">
  <h1><span>⚽</span> Palpites Copa 2026</h1>
  <div class="metrics">
    <div class="metric"><div class="metric-val" id="total-pts">0</div><div class="metric-label">Pontos</div></div>
    <div class="metric"><div class="metric-val" id="exact-hits">0</div><div class="metric-label">Exatos</div></div>
    <div class="metric"><div class="metric-val" id="winner-hits">0</div><div class="metric-label">Vencedor</div></div>
    <div class="metric"><div class="metric-val" id="pending-count">0</div><div class="metric-label">Pendentes</div></div>
  </div>
</div>

<div class="content">
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">Todos</button>
    <button class="filter-btn" onclick="setFilter('done', this)">Finalizados</button>
    <button class="filter-btn" onclick="setFilter('pending', this)">Pendentes</button>
    <button class="filter-btn" onclick="setFilter('hit', this)">Acertos</button>
    <button class="filter-btn" onclick="setFilter('miss', this)">Erros</button>
    <button class="reset-btn" onclick="resetAll()">Limpar resultados</button>
  </div>

  <div id="table-container"></div>
</div>

<div class="saved-toast" id="toast">✓ Salvo</div>

const officialResults = {
  1: [2,0], 2: [2,1], 3: [1,1], 4: [4,1],
  5: [1,1], 6: [1,1], 7: [0,1], 8: [2,0],
  9: [7,1], 10: [2,2], 11: [1,0], 12: [5,1],
  13: [0,0], 14: [1,1], 15: [1,1], 16: [2,2],
};

let userResults = {};
let currentFilter = 'all';
let toastTimer = null;

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) userResults = JSON.parse(raw);
  } catch(e) { userResults = {}; }
}

function saveToStorage() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(userResults));
    showToast();
  } catch(e) {}
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

function getReal(g) {
  if (officialResults[g.id]) return officialResults[g.id];
  if (userResults[g.id] && userResults[g.id][0] !== null && userResults[g.id][1] !== null) return userResults[g.id];
  return null;
}

function calcPoints(p, r) {
  if (!r) return null;
  if (p[0] === r[0] && p[1] === r[1]) return 3;
  const pW = p[0] > p[1] ? 'H' : p[0] < p[1] ? 'A' : 'D';
  const rW = r[0] > r[1] ? 'H' : r[0] < r[1] ? 'A' : 'D';
  return pW === rW ? 1 : 0;
}

function updateSummary() {
  let total=0, exact=0, winner=0, pending=0;
  games.forEach(g => {
    const r = getReal(g);
    const pts = calcPoints(g.palpite, r);
    if (pts === null) pending++;
    else { total += pts; if (pts === 3) exact++; if (pts === 1) winner++; }
  });
  document.getElementById('total-pts').textContent = total;
  document.getElementById('exact-hits').textContent = exact;
  document.getElementById('winner-hits').textContent = winner;
  document.getElementById('pending-count').textContent = pending;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function resetAll() {
  if (!confirm('Limpar todos os resultados inseridos manualmente?')) return;
  userResults = {};
  saveToStorage();
  renderTable();
  updateSummary();
}

function onInput(id, side, val) {
  const n = parseInt(val, 10);
  if (!userResults[id]) userResults[id] = [null, null];
  if (side === 'h') userResults[id][0] = isNaN(n) || n < 0 ? null : n;
  else              userResults[id][1] = isNaN(n) || n < 0 ? null : n;
  saveToStorage();
  updateSummary();
  const r = getReal(games.find(g => g.id === id));
  const pts = calcPoints(games.find(g => g.id === id).palpite, r);
  const badge = document.querySelector(`tr[data-id="${id}"] .pts-cell`);
  if (badge) badge.innerHTML = ptsBadgeHTML(pts);
}

function ptsBadgeHTML(pts) {
  if (pts === null) return `<span class="pts-badge pts-pending">—</span>`;
  if (pts === 3) return `<span class="pts-badge pts-3" title="Placar exato">3</span>`;
  if (pts === 1) return `<span class="pts-badge pts-1" title="Acertou o vencedor">1</span>`;
  return `<span class="pts-badge pts-0" title="Errou">0</span>`;
}

function renderTable() {
  const container = document.getElementById('table-container');
  const filtered = games.filter(g => {
    const r = getReal(g);
    const pts = calcPoints(g.palpite, r);
    if (currentFilter === 'done')    return !!r;
    if (currentFilter === 'pending') return !r;
    if (currentFilter === 'hit')     return pts !== null && pts > 0;
    if (currentFilter === 'miss')    return pts !== null && pts === 0;
    return true;
  });

  if (filtered.length === 0) {
    container.innerHTML = `<div class="no-results">Nenhum jogo encontrado para este filtro.</div>`;
    return;
  }

  let grouped = {};
  filtered.forEach(g => {
    if (!grouped[g.date]) grouped[g.date] = [];
    grouped[g.date].push(g);
  });

  let html = '';
  Object.entries(grouped).forEach(([date, gamesInDate]) => {
    html += `<div class="section-header">${date}</div>`;
    html += `<table><thead><tr>
      <th>Jogo</th>
      <th class="center">Meu palpite</th>
      <th class="center">Resultado real</th>
      <th class="center">Pts</th>
    </tr></thead><tbody>`;

    gamesInDate.forEach(g => {
      const r = getReal(g);
      const pts = calcPoints(g.palpite, r);
      const isOfficial = !!officialResults[g.id];

      let resultCell = '';
      if (isOfficial) {
        resultCell = `<div class="official-result">${r[0]} – ${r[1]}</div><div class="official-label">oficial</div>`;
      } else {
        const ur = userResults[g.id] || [null, null];
        const hv = ur[0] !== null ? ur[0] : '';
        const av = ur[1] !== null ? ur[1] : '';
        resultCell = `<div class="result-input">
          <input class="score-in" type="number" min="0" max="30" placeholder="?" value="${hv}"
            oninput="onInput(${g.id},'h',this.value)" />
          <span class="score-sep">–</span>
          <input class="score-in" type="number" min="0" max="30" placeholder="?" value="${av}"
            oninput="onInput(${g.id},'a',this.value)" />
        </div>`;
      }

      html += `<tr data-id="${g.id}">
        <td>
          <div class="match-name">${g.home} × ${g.away}</div>
          <div class="match-meta">
            <span class="match-date">${g.date}</span>
            <span class="grp-badge">Grupo ${g.grp}</span>
          </div>
        </td>
        <td class="center"><span class="palpite">${g.palpite[0]} – ${g.palpite[1]}</span></td>
        <td class="center">${resultCell}</td>
        <td class="center pts-cell">${ptsBadgeHTML(pts)}</td>
      </tr>`;
    });

    html += `</tbody></table>`;
  });

  container.innerHTML = html;
}

loadFromStorage();
renderTable();
updateSummary();
</script>
</body>
</html>
